name: Deploy to Vercel

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build
      env:
        NODE_OPTIONS: --max-old-space-size=4096
        
    - name: Verify build artifacts
      run: |
        echo "✅ Build completed successfully!"
        echo "📦 Build artifacts:"
        ls -la dist/
        echo "📊 Build size:"
        du -sh dist/
        
    - name: Comment PR with build status
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `✅ **Build Successful!**
            
            🎯 **EchoMapper** has been built successfully and is ready for deployment.
            
            📦 **Build artifacts** are available in the \`dist/\` directory.
            
            To deploy this application:
            1. Configure Vercel secrets (\`VERCEL_TOKEN\`, \`VERCEL_ORG_ID\`, \`VERCEL_PROJECT_ID\`)
            2. Or deploy manually using \`npm run build && vercel --prod\`
            
            🚀 The application is production-ready!`
          });
